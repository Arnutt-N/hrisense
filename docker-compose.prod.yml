# Supabase Self-Hosted Production Stack
# ======================================
# Usage:
#   1. Copy .env.production.example to .env.production และตั้งค่าให้ครบ
#   2. docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#   3. รอ services ทั้งหมดพร้อม → เปิด Studio ที่ http://localhost:8443
#
# Required env vars — ดู .env.production.example

name: hrisense-supabase-prod

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1
    container_name: supabase-db
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-supabase}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - supabase-net

  # ─── Supabase Studio (Admin UI) ───────────────────────────────────────
  studio:
    image: supabase/studio:20241202
    container_name: supabase-studio
    restart: unless-stopped
    healthcheck:
      test: node -e "require('http').get('http://localhost:3000/api/profile', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_ORG_NAME:-HRiSENSE}
      DEFAULT_PROJECT_NAME: ${STUDIO_PROJECT_NAME:-HRiSENSE Production}
      SUPABASE_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      LOGFLARE_URL: http://analytics:4000
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-supabase-analytics-admin}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    networks:
      - supabase-net

  # ─── Auth ──────────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.164.0
    container_name: supabase-auth
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9999/health
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}/auth/v1
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supabase}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@hrisense.local}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-inbucket}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-9999}:9999"
    networks:
      - supabase-net

  # ─── REST API (PostgREST) ─────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supabase}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${REST_PORT:-3001}:3000"
    networks:
      - supabase-net

  # ─── Realtime ─────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.31.2
    container_name: supabase-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-supabase}
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: ""
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    networks:
      - supabase-net

  # ─── Storage ──────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.11.13
    container_name: supabase-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supabase}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage_data:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    ports:
      - "${STORAGE_PORT:-5000}:5000"
    networks:
      - supabase-net

  # ─── Meta (PG Metadata API) ───────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.88.0
    container_name: supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-supabase}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${META_PORT:-8080}:8080"
    networks:
      - supabase-net

  # ─── Kong (API Gateway) ───────────────────────────────────────────────
  kong:
    image: kong:2.8.1
    container_name: supabase-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST A CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_WORKER_PROCESSES: 1
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
      realtime:
        condition: service_started
      storage:
        condition: service_started
      meta:
        condition: service_started
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
      - "${KONG_SSL_PORT:-8443}:8443"
    networks:
      - supabase-net

  # ─── Inbucket (Dev Email Testing) ─────────────────────────────────────
  inbucket:
    image: inbucket/inbucket:3.0.3
    container_name: supabase-inbucket
    restart: unless-stopped
    ports:
      - "${INBUCKET_WEB_PORT:-9000}:9000"
      - "${INBUCKET_SMTP_PORT:-2500}:2500"
      - "${INBUCKET_POP3_PORT:-1100}:1100"
    networks:
      - supabase-net

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local

networks:
  supabase-net:
    driver: bridge
