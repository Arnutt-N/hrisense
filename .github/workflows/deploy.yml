name: CD Pipeline (Deploy)

# Runs AFTER a PR is merged to main:
#   1. Apply database migrations to production Supabase
#   2. Deploy frontend to Vercel
#
# Required GitHub Secrets (workflow จะ skip ถ้าไม่มี):
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROD_PROJECT_REF, SUPABASE_PROD_DB_PASSWORD
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# NOTE: secrets context ไม่สามารถใช้ใน job-level `if:` ได้ (parse-time error
# "Unrecognized named-value: 'secrets'"). จึงใช้ job `preflight` map secrets -> env
# ใน step แล้ว export เป็น outputs ให้ job อื่น gate ด้วย needs.preflight.outputs.*

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # ─── Step 0: Preflight — ตรวจว่ามี secrets ครบไหม ─────────────────────
  preflight:
    name: Preflight (check secrets)
    runs-on: ubuntu-latest
    outputs:
      has_supabase: ${{ steps.check.outputs.has_supabase }}
      has_vercel: ${{ steps.check.outputs.has_vercel }}
    steps:
      - id: check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          SUPABASE_PROD_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROD_PROJECT_REF" ] && [ -n "$SUPABASE_PROD_DB_PASSWORD" ]; then
            echo "has_supabase=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_supabase=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "has_vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Step 1: Migrate Database ─────────────────────────────────────────
  migrate:
    name: Migrate Database
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.has_supabase == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production Supabase
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_PROD_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations to production
        run: supabase db push --linked

      - name: Verify migration
        run: |
          echo "=== Migration applied successfully ==="
          supabase db diff --linked --schema public || true

  # ─── Step 2: Deploy Frontend ──────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [preflight, migrate]
    # Deploy frontend ถ้ามี Vercel secrets — รันแม้ migrate จะถูก skip/fail
    if: always() && needs.preflight.outputs.has_vercel == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  # ─── แจ้งเตือนถ้าไม่มี secrets ───────────────────────────────────────────
  check-secrets:
    name: Check Deploy Configuration
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.has_supabase != 'true' || needs.preflight.outputs.has_vercel != 'true'
    steps:
      - name: Notify — Deploy skipped (secrets not configured)
        run: |
          echo "::notice::⚠️ Deploy workflow skipped — required secrets not configured."
          echo ""
          echo "To enable auto-deploy, add these GitHub Secrets:"
          echo "  - SUPABASE_ACCESS_TOKEN"
          echo "  - SUPABASE_PROD_PROJECT_REF"
          echo "  - SUPABASE_PROD_DB_PASSWORD"
          echo "  - VERCEL_TOKEN"
          echo "  - VERCEL_ORG_ID"
          echo "  - VERCEL_PROJECT_ID"
          echo "  - NEXT_PUBLIC_SUPABASE_URL"
          echo "  - NEXT_PUBLIC_SUPABASE_ANON_KEY"
          echo ""
          echo "See CONTRIBUTING.md for details."
