name: Deploy Preview

# NOTE: secrets context ใช้ใน job-level `if:` ไม่ได้ (parse-time error
# "Unrecognized named-value: 'secrets'"). จึงใช้ job `preflight` map secrets -> env
# ใน step แล้ว export เป็น output ให้ job อื่น gate ด้วย needs.preflight.outputs.*

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Preflight — ตรวจว่ามี Vercel secrets ครบไหม ─────────────────────
  preflight:
    name: Preflight (check secrets)
    runs-on: ubuntu-latest
    outputs:
      has_vercel: ${{ steps.check.outputs.has_vercel }}
    steps:
      - id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "has_vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Deploy Preview to Vercel ──────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.has_vercel == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--yes'
          working-directory: ./
          github-comment: true

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        if: steps.vercel-deploy.outputs.preview-url
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.vercel-deploy.outputs.preview-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment**\n\nView the preview: ${previewUrl}`
            });

  # ─── แจ้งเตือนถ้าไม่มี secrets ───────────────────────────────────────────
  notify-skipped:
    name: Check Preview Configuration
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.has_vercel != 'true'
    steps:
      - name: Notify — Preview skipped
        run: |
          echo "::notice::⚠️ Preview deployment skipped — Vercel secrets not configured."
          echo "To enable preview deployments, add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets."
